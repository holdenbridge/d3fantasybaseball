<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D3 Baseball Fantasy</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e4e9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      text-align: center;
      padding: 2rem 1rem 1rem;
      background: linear-gradient(180deg, #161a25 0%, #0f1117 100%);
      border-bottom: 1px solid #23283a;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: .02em;
      background: linear-gradient(135deg, #4fa3ff 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 span {
      font-weight: 400;
      opacity: .7;
      font-size: 1rem;
      display: block;
      margin-top: .3rem;
      background: none;
      -webkit-text-fill-color: #8b90a0;
    }

    /* ── tabs ── */
    .tab-bar {
      display: flex;
      gap: 4px;
      width: 100%;
      max-width: 1100px;
      padding: 1rem 1rem 0;
    }

    .tab-btn {
      flex: 1;
      padding: .65rem .5rem;
      border: 1px solid #23283a;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      background: #161a25;
      color: #8b90a0;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
      text-align: center;
    }

    .tab-btn:hover { background: #1c2035; color: #c8cbda }
    .tab-btn.active {
      background: #0f1117;
      color: #4fa3ff;
      border-color: #333a52;
      border-bottom: 1px solid #0f1117;
      position: relative;
      z-index: 1;
    }

    .tab-panel {
      display: none;
      width: 100%;
      max-width: 1100px;
      border-top: 1px solid #333a52;
    }

    .tab-panel.active { display: block }

    .tab-todo {
      padding: 5rem 2rem;
      text-align: center;
      color: #636882;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: .02em;
    }

    /* ── chart containers ── */
    #chart-container, #score-container, #hr-container, #k-container, #war-container {
      width: 100%;
      max-width: 1100px;
      padding: 1.5rem 1rem;
    }

    .bar { transition: opacity .15s }
    .bar:hover { opacity: .85 }

    .team-label {
      fill: #c8cbda;
      font-size: 13px;
      font-weight: 500;
    }

    .win-label {
      fill: #e2e4e9;
      font-size: 12px;
      font-weight: 600;
    }

    .axis line, .axis path { stroke: #2a2f42 }
    .axis text { fill: #8b90a0; font-size: 12px }

    .tooltip {
      position: absolute;
      pointer-events: none;
      background: #1e2233;
      border: 1px solid #333a52;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.5;
      color: #d1d5e4;
      box-shadow: 0 4px 20px rgba(0,0,0,.45);
      opacity: 0;
      transition: opacity .12s;
    }

    .tooltip strong { color: #fff }

    .loading {
      text-align: center;
      padding: 4rem 1rem;
      color: #8b90a0;
      font-size: 1.1rem;
    }

    .loading .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #2a2f42;
      border-top-color: #4fa3ff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-bottom: .8rem;
    }

    @keyframes spin { to { transform: rotate(360deg) } }

    /* ── mobile ── */
    @media (max-width: 600px) {
      header { padding: 1.2rem .8rem .8rem }
      h1 { font-size: 1.4rem }
      h1 span { font-size: .7rem }
      .tab-bar { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; padding: .6rem .5rem 0 }
      .tab-btn { flex: 0 0 auto; padding: .45rem .65rem; font-size: .72rem; white-space: nowrap }
      #chart-container, #score-container, #hr-container, #k-container, #war-container {
        padding: .8rem .4rem;
      }
      .tooltip { font-size: 11px; padding: 8px 10px; max-width: 260px }
    }
  </style>
</head>
<body>

<header>
  <h1>D3 Baseball Fantasy<span>Team Wins = 1 point | Home Runs = 2 points | Strikeouts = .5 points | Rookie WAR = 10 points</span></h1>
</header>

<nav class="tab-bar">
  <button class="tab-btn active" data-tab="total-score">Total Score</button>
  <button class="tab-btn" data-tab="team-wins">Team Wins</button>
  <button class="tab-btn" data-tab="batter-hr">Batter Home Runs</button>
  <button class="tab-btn" data-tab="pitcher-k">Pitcher Strikeouts</button>
  <button class="tab-btn" data-tab="rookie-war">Rookie WAR</button>
</nav>

<div class="tab-panel active" id="panel-total-score">
  <div id="score-container">
    <div class="loading" id="score-loading">
      <div class="spinner"></div>
      <div>Calculating scores…</div>
    </div>
  </div>
</div>

<div class="tab-panel" id="panel-team-wins">
  <div id="chart-container">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>Loading standings…</div>
    </div>
  </div>
</div>

<div class="tab-panel" id="panel-batter-hr">
  <div id="hr-container">
    <div class="loading" id="hr-loading">
      <div class="spinner"></div>
      <div>Loading home run leaders…</div>
    </div>
  </div>
</div>

<div class="tab-panel" id="panel-pitcher-k">
  <div id="k-container">
    <div class="loading" id="k-loading">
      <div class="spinner"></div>
      <div>Loading strikeout leaders…</div>
    </div>
  </div>
</div>

<div class="tab-panel" id="panel-rookie-war">
  <div id="war-container">
    <div class="loading" id="war-loading">
      <div class="spinner"></div>
      <div>Loading rookie WAR data…</div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
/* ── tab switching ── */
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
  });
});

/* ── player roster config ── */
const PLAYERS = [
  { name: "Holden", emoji: "🦅", color: "#4fa3ff", avatar: "/static/avatars/holden.png", teams: ["Chicago Cubs", "New York Yankees"], batters: ["Shohei Ohtani", "Aaron Judge"], pitchers: ["Cole Ragans", "Logan Webb"], rookie: "Kevin McGonigle" },
  { name: "Zach",   emoji: "⚡", color: "#f59e0b", avatar: "/static/avatars/zach.png", teams: ["Detroit Tigers", "Seattle Mariners"], batters: ["Cal Raleigh", "Pete Alonso"], pitchers: ["Paul Skenes", "Bryan Woo"], rookie: "Kazuma Okamoto" },
  { name: "Cam",    emoji: "🔥", color: "#10b981", avatar: "/static/avatars/cam.png", teams: ["Philadelphia Phillies", "Boston Red Sox"], batters: ["Juan Soto", "Nick Kurtz"], pitchers: ["Garrett Crochet", "Cristopher Sánchez"], rookie: "Munetaka Murakami" },
  { name: "Jonny",  emoji: "🐉", color: "#ef4444", avatar: "/static/avatars/jonny.png", teams: ["Los Angeles Dodgers", "New York Mets"], batters: ["Kyle Schwarber", "Junior Caminero"], pitchers: ["Tarik Skubal", "Dylan Cease"], rookie: "JJ Wetherholt" },
];

const tooltip = d3.select("#tooltip");
const isMobile = window.innerWidth < 600;
const baseWidth = Math.min(window.innerWidth, 1100);

function truncName(name, maxLen) {
  if (name.length <= maxLen) return name;
  return name.slice(0, maxLen - 1) + "…";
}

function attachTooltip(selection, htmlFn) {
  selection
    .on("mouseenter", (event, d) => {
      tooltip.style("opacity", 1).html(htmlFn(d));
    })
    .on("mousemove", event => {
      tooltip.style("left", (event.pageX + 14) + "px")
             .style("top",  (event.pageY - 14) + "px");
    })
    .on("mouseleave", () => tooltip.style("opacity", 0))
    .on("touchstart", (event, d) => {
      event.preventDefault();
      const touch = event.touches[0];
      tooltip.style("opacity", 1).html(htmlFn(d))
        .style("left", Math.min(touch.pageX + 14, window.innerWidth - 270) + "px")
        .style("top",  (touch.pageY - 40) + "px");
    });
}

document.addEventListener("touchstart", e => {
  if (!e.target.classList.contains("bar")) tooltip.style("opacity", 0);
});

(async () => {
  const [standingsRes, hrRes, kRes, warRes] = await Promise.all([
    fetch("/api/standings"),
    fetch("/api/hr-leaders"),
    fetch("/api/k-leaders"),
    fetch("/api/war-rookies"),
  ]);
  const standings  = await standingsRes.json();
  const allHrData  = await hrRes.json();
  const allKData   = await kRes.json();
  const warPayload  = await warRes.json();
  const allWarData = warPayload.rookies ?? warPayload;
  if (warPayload.note){
    const banner = document.createElement("div");
    banner.textContent = "\u26A0\uFE0F " + warPayload.note;
    banner.style.cssText = "background:#2a2520;color:#f0c36d;padding:10px 16px;border-radius:8px;text-align:center;margin:12px auto;max-width:600px;width:calc(100% - 32px);font-size:13px;border:1px solid #3d3428;";
    const header = document.querySelector("header");
    header ? header.after(banner) : document.body.prepend(banner);
  }

  const teamMap = Object.fromEntries(standings.map(t => [t.name, t]));
  const hrMap   = Object.fromEntries(allHrData.map(b => [b.name, b]));
  const kMap    = Object.fromEntries(allKData.map(p => [p.name, p]));
  const warMap  = Object.fromEntries(allWarData.map(r => [r.name, r]));

  /* ═══════════════════════════════════════
     TOTAL SCORE CHART
     ═══════════════════════════════════════ */
  document.getElementById("score-loading").remove();

  const playerData = PLAYERS.map(p => {
    const teamWins  = p.teams.reduce((sum, name) => sum + (teamMap[name]?.w || 0), 0);
    const batterHR  = p.batters.reduce((sum, name) => sum + (hrMap[name]?.hr || 0), 0);
    const pitcherK  = p.pitchers.reduce((sum, name) => sum + (kMap[name]?.k || 0), 0);
    const rookieWAR = warMap[p.rookie]?.war || 0;
    return {
      name: p.name,
      emoji: p.emoji,
      avatar: p.avatar || null,
      color: p.color,
      teamWins,
      batterHR,
      pitcherK,
      rookieWAR,
      rookieName: p.rookie,
      score: teamWins * 1 + batterHR * 2 + pitcherK * 0.5 + rookieWAR * 10,
      teams: p.teams.map(name => teamMap[name]).filter(Boolean),
      batters: p.batters.map(name => hrMap[name]).filter(Boolean),
      pitchers: p.pitchers.map(name => kMap[name]).filter(Boolean),
    };
  }).sort((a, b) => b.score - a.score);

  {
    const margin = isMobile
      ? { top: 15, right: 50, bottom: 35, left: 100 }
      : { top: 20, right: 80, bottom: 40, left: 160 };
    const rowH = isMobile ? 50 : 64;
    const width  = Math.max(baseWidth, margin.left + margin.right + 100);
    const height = margin.top + margin.bottom + playerData.length * rowH;
    const avatarSize = isMobile ? 24 : 36;
    const nameFontSize = isMobile ? "13px" : "16px";

    const svg = d3.select("#score-container")
      .append("svg")
      .attr("viewBox", `0 0 ${width} ${height}`)
      .attr("preserveAspectRatio", "xMinYMin meet")
      .attr("width", "100%")
      .style("height", "auto");

    const g = svg.append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    const innerW = width - margin.left - margin.right;
    const innerH = height - margin.top - margin.bottom;

    const x = d3.scaleLinear()
      .domain([0, d3.max(playerData, d => d.score) + 10])
      .range([0, innerW]);

    const y = d3.scaleBand()
      .domain(playerData.map(d => d.name))
      .range([0, innerH])
      .padding(0.3);

    g.append("g")
      .attr("class", "axis")
      .attr("transform", `translate(0,${innerH})`)
      .call(d3.axisBottom(x).ticks(isMobile ? 4 : 8))
      .selectAll("text").style("fill", "#8b90a0");

    g.append("text")
      .attr("x", innerW / 2).attr("y", innerH + 34)
      .attr("text-anchor", "middle")
      .attr("fill", "#636882").attr("font-size", "12px")
      .text("Total Points");

    const scoreBars = g.selectAll(".bar")
      .data(playerData)
      .join("rect")
      .attr("class", "bar")
      .attr("y", d => y(d.name))
      .attr("height", y.bandwidth())
      .attr("x", 0).attr("width", 0)
      .attr("rx", 6)
      .attr("fill", d => d.color);

    attachTooltip(scoreBars, d => {
      const teamNick = n => { const TWO_WORD = ["Red Sox","White Sox","Blue Jays"]; const m = TWO_WORD.find(t => n.endsWith(t)); return m || n.split(" ").pop(); };
      const teamShort = d.teams.map(t => teamNick(t.name)).join(" & ");
      const batterShort = d.batters.map(b => b.name.split(" ").pop()).join(" & ");
      const pitcherShort = d.pitchers.map(p => p.name.split(" ").pop()).join(" & ");
      const rookieShort = d.rookieName.split(" ").pop();
      const nameLabel = d.avatar
        ? `<strong><img src="${d.avatar}" style="height:1.2em;vertical-align:middle;border-radius:50%;margin-right:4px">${d.name}</strong>`
        : `<strong>${d.emoji} ${d.name}</strong>`;
      return [
        nameLabel,
        `Team Wins: ${d.teamWins} pts (${teamShort})`,
        `Batter HRs: ${d.batterHR * 2} pts (${batterShort || "none in data"})`,
        `Pitcher Ks: ${d.pitcherK * 0.5} pts (${pitcherShort || "none in data"})`,
        `Rookie WAR: ${d.rookieWAR * 10} pts (${rookieShort})`,
      ].join("<br>");
    });

    scoreBars.transition().duration(600).delay((_, i) => i * 80)
      .attr("width", d => x(d.score));

    g.selectAll(".win-label")
      .data(playerData)
      .join("text")
      .attr("class", "win-label")
      .attr("y", d => y(d.name) + y.bandwidth() / 2 + 5)
      .attr("x", d => x(d.score) + 8)
      .attr("opacity", 0)
      .text(d => d.score + " pts")
      .transition().duration(600).delay((_, i) => i * 80 + 300)
      .attr("opacity", 1);

    const labels = svg.append("g")
      .selectAll(".player-row")
      .data(playerData)
      .join("g")
      .attr("class", "player-row")
      .attr("transform", d =>
        `translate(0, ${margin.top + y(d.name) + y.bandwidth() / 2})`
      );

    const halfAvatar = avatarSize / 2;
    labels.each(function(d) {
      const el = d3.select(this);
      if (d.avatar) {
        el.append("image")
          .attr("href", d.avatar)
          .attr("x", isMobile ? 4 : 10).attr("y", -halfAvatar)
          .attr("width", avatarSize).attr("height", avatarSize)
          .attr("clip-path", `circle(${halfAvatar}px at ${halfAvatar}px ${halfAvatar}px)`);
      } else {
        el.append("text")
          .attr("x", isMobile ? 8 : 18).attr("y", 8)
          .attr("font-size", isMobile ? "22px" : "32px")
          .text(d.emoji);
      }
    });

    labels.append("text")
      .attr("class", "team-label")
      .attr("x", isMobile ? 36 : 60).attr("y", 5)
      .attr("font-size", nameFontSize).attr("font-weight", "700")
      .attr("fill", d => d.color)
      .text(d => d.name);
  }

  /* ═══════════════════════════════════════
     TEAM WINS CHART (all teams, undrafted faded)
     ═══════════════════════════════════════ */
  document.getElementById("loading").remove();

  const logoUrl = id => `https://www.mlbstatic.com/team-logos/${id}.svg`;

  const ownerColorMap = {};
  PLAYERS.forEach(p => p.teams.forEach(t => { ownerColorMap[t] = { color: p.color, owner: p.name, emoji: p.emoji }; }));

  {
    const isDrafted = d => d.name in ownerColorMap;
    const margin = isMobile
      ? { top: 15, right: 40, bottom: 35, left: 120 }
      : { top: 20, right: 60, bottom: 40, left: 200 };
    const rowH = isMobile ? 26 : 32;
    const width  = Math.max(baseWidth, margin.left + margin.right + 100);
    const height = margin.top + margin.bottom + standings.length * rowH;

    const svg = d3.select("#chart-container")
      .append("svg")
      .attr("viewBox", `0 0 ${width} ${height}`)
      .attr("preserveAspectRatio", "xMinYMin meet")
      .attr("width", "100%")
      .style("height", "auto");

    const g = svg.append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    const innerW = width - margin.left - margin.right;
    const innerH = height - margin.top - margin.bottom;

    const x = d3.scaleLinear()
      .domain([0, d3.max(standings, d => d.w) + 5])
      .range([0, innerW]);

    const y = d3.scaleBand()
      .domain(standings.map(d => d.name))
      .range([0, innerH])
      .padding(0.25);

    g.append("g")
      .attr("class", "axis")
      .attr("transform", `translate(0,${innerH})`)
      .call(d3.axisBottom(x).ticks(isMobile ? 4 : 8))
      .selectAll("text").style("fill", "#8b90a0");

    g.append("text")
      .attr("x", innerW / 2).attr("y", innerH + 34)
      .attr("text-anchor", "middle")
      .attr("fill", "#636882").attr("font-size", "12px")
      .text("Wins");

    const winBars = g.selectAll(".bar")
      .data(standings)
      .join("rect")
      .attr("class", "bar")
      .attr("y", d => y(d.name))
      .attr("height", y.bandwidth())
      .attr("x", 0).attr("width", 0)
      .attr("rx", 4)
      .attr("fill", d => isDrafted(d) ? ownerColorMap[d.name].color : "#555")
      .attr("opacity", d => isDrafted(d) ? 1 : 0.5);

    attachTooltip(winBars, d => {
      const owner = isDrafted(d) ? `Owner: ${ownerColorMap[d.name].owner}` : "Undrafted";
      return `<strong>${d.name}</strong><br>Wins: ${d.w} &nbsp; Losses: ${d.l}<br>${owner}`;
    });

    winBars.transition().duration(600).delay((_, i) => i * 25)
      .attr("width", d => x(d.w));

    g.selectAll(".win-label")
      .data(standings)
      .join("text")
      .attr("class", "win-label")
      .attr("y", d => y(d.name) + y.bandwidth() / 2 + 4)
      .attr("x", d => x(d.w) + 6)
      .attr("opacity", 0)
      .text(d => d.w)
      .transition().duration(600).delay((_, i) => i * 25 + 300)
      .attr("opacity", d => isDrafted(d) ? 1 : 0.5);

    const labels = svg.append("g")
      .selectAll(".team-row")
      .data(standings)
      .join("g")
      .attr("class", "team-row")
      .attr("transform", d =>
        `translate(0, ${margin.top + y(d.name) + y.bandwidth() / 2})`
      )
      .attr("opacity", d => isDrafted(d) ? 1 : 0.5);

    if (!isMobile) {
      labels.append("image")
        .attr("href", d => logoUrl(d.team_id))
        .attr("x", margin.left - 170).attr("y", -12)
        .attr("width", 24).attr("height", 24);
    }

    labels.append("text")
      .attr("class", "team-label")
      .attr("x", isMobile ? 8 : margin.left - 140).attr("y", 5)
      .attr("font-size", isMobile ? "5px" : "13px")
      .text(d => isMobile ? truncName(d.name, 16) : d.name);
  }

  /* ═══════════════════════════════════════
     BATTER HOME RUNS CHART
     ═══════════════════════════════════════ */
  document.getElementById("hr-loading").remove();

  const batterOwnerMap = {};
  PLAYERS.forEach(p => p.batters.forEach(b => { batterOwnerMap[b] = { color: p.color, owner: p.name, emoji: p.emoji }; }));

  const top20 = allHrData.slice(0, 20);
  const top20Names = new Set(top20.map(d => d.name));
  const draftedOutside = allHrData.filter(d => d.name in batterOwnerMap && !top20Names.has(d.name));
  const hrData = [...top20, ...draftedOutside].sort((a, b) => b.hr - a.hr);

  {
    const isBatterDrafted = d => d.name in batterOwnerMap;
    const margin = isMobile
      ? { top: 15, right: 40, bottom: 35, left: 120 }
      : { top: 20, right: 60, bottom: 40, left: 200 };
    const rowH = isMobile ? 26 : 32;
    const width  = Math.max(baseWidth, margin.left + margin.right + 100);
    const height = margin.top + margin.bottom + hrData.length * rowH;

    const svg = d3.select("#hr-container")
      .append("svg")
      .attr("viewBox", `0 0 ${width} ${height}`)
      .attr("preserveAspectRatio", "xMinYMin meet")
      .attr("width", "100%")
      .style("height", "auto");

    const g = svg.append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    const innerW = width - margin.left - margin.right;
    const innerH = height - margin.top - margin.bottom;

    const x = d3.scaleLinear()
      .domain([0, d3.max(hrData, d => d.hr) + 3])
      .range([0, innerW]);

    const y = d3.scaleBand()
      .domain(hrData.map(d => d.name))
      .range([0, innerH])
      .padding(0.25);

    g.append("g")
      .attr("class", "axis")
      .attr("transform", `translate(0,${innerH})`)
      .call(d3.axisBottom(x).ticks(isMobile ? 4 : 8))
      .selectAll("text").style("fill", "#8b90a0");

    g.append("text")
      .attr("x", innerW / 2).attr("y", innerH + 34)
      .attr("text-anchor", "middle")
      .attr("fill", "#636882").attr("font-size", "12px")
      .text("Home Runs");

    const hrBars = g.selectAll(".bar")
      .data(hrData)
      .join("rect")
      .attr("class", "bar")
      .attr("y", d => y(d.name))
      .attr("height", y.bandwidth())
      .attr("x", 0).attr("width", 0)
      .attr("rx", 4)
      .attr("fill", d => isBatterDrafted(d) ? batterOwnerMap[d.name].color : "#555")
      .attr("opacity", d => isBatterDrafted(d) ? 1 : 0.5);

    attachTooltip(hrBars, d => {
      const owner = isBatterDrafted(d) ? `Owner: ${batterOwnerMap[d.name].owner}` : "Undrafted";
      return `<strong>${d.name}</strong><br>Home Runs: ${d.hr}<br>${d.team}<br>${owner}`;
    });

    hrBars.transition().duration(600).delay((_, i) => i * 25)
      .attr("width", d => x(d.hr));

    g.selectAll(".win-label")
      .data(hrData)
      .join("text")
      .attr("class", "win-label")
      .attr("y", d => y(d.name) + y.bandwidth() / 2 + 4)
      .attr("x", d => x(d.hr) + 6)
      .attr("opacity", 0)
      .text(d => d.hr)
      .transition().duration(600).delay((_, i) => i * 25 + 300)
      .attr("opacity", d => isBatterDrafted(d) ? 1 : 0.5);

    const labels = svg.append("g")
      .selectAll(".batter-row")
      .data(hrData)
      .join("g")
      .attr("class", "batter-row")
      .attr("transform", d =>
        `translate(0, ${margin.top + y(d.name) + y.bandwidth() / 2})`
      )
      .attr("opacity", d => isBatterDrafted(d) ? 1 : 0.5);

    labels.append("text")
      .attr("class", "team-label")
      .attr("x", isMobile ? 8 : 14).attr("y", 5)
      .attr("font-size", isMobile ? "5px" : "13px")
      .text(d => isMobile ? truncName(d.name, 16) : d.name);
  }

  /* ═══════════════════════════════════════
     PITCHER STRIKEOUTS CHART
     ═══════════════════════════════════════ */
  document.getElementById("k-loading").remove();

  const pitcherOwnerMap = {};
  PLAYERS.forEach(p => p.pitchers.forEach(name => { pitcherOwnerMap[name] = { color: p.color, owner: p.name, emoji: p.emoji }; }));

  const kTop20 = allKData.slice(0, 20);
  const kTop20Names = new Set(kTop20.map(d => d.name));
  const kDraftedOutside = allKData.filter(d => d.name in pitcherOwnerMap && !kTop20Names.has(d.name));
  const kData = [...kTop20, ...kDraftedOutside].sort((a, b) => b.k - a.k);

  {
    const isPitcherDrafted = d => d.name in pitcherOwnerMap;
    const margin = isMobile
      ? { top: 15, right: 40, bottom: 35, left: 120 }
      : { top: 20, right: 60, bottom: 40, left: 200 };
    const rowH = isMobile ? 26 : 32;
    const width  = Math.max(baseWidth, margin.left + margin.right + 100);
    const height = margin.top + margin.bottom + kData.length * rowH;

    const svg = d3.select("#k-container")
      .append("svg")
      .attr("viewBox", `0 0 ${width} ${height}`)
      .attr("preserveAspectRatio", "xMinYMin meet")
      .attr("width", "100%")
      .style("height", "auto");

    const g = svg.append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    const innerW = width - margin.left - margin.right;
    const innerH = height - margin.top - margin.bottom;

    const x = d3.scaleLinear()
      .domain([0, d3.max(kData, d => d.k) + 10])
      .range([0, innerW]);

    const y = d3.scaleBand()
      .domain(kData.map(d => d.name))
      .range([0, innerH])
      .padding(0.25);

    g.append("g")
      .attr("class", "axis")
      .attr("transform", `translate(0,${innerH})`)
      .call(d3.axisBottom(x).ticks(isMobile ? 4 : 8))
      .selectAll("text").style("fill", "#8b90a0");

    g.append("text")
      .attr("x", innerW / 2).attr("y", innerH + 34)
      .attr("text-anchor", "middle")
      .attr("fill", "#636882").attr("font-size", "12px")
      .text("Strikeouts");

    const kBars = g.selectAll(".bar")
      .data(kData)
      .join("rect")
      .attr("class", "bar")
      .attr("y", d => y(d.name))
      .attr("height", y.bandwidth())
      .attr("x", 0).attr("width", 0)
      .attr("rx", 4)
      .attr("fill", d => isPitcherDrafted(d) ? pitcherOwnerMap[d.name].color : "#555")
      .attr("opacity", d => isPitcherDrafted(d) ? 1 : 0.5);

    attachTooltip(kBars, d => {
      const owner = isPitcherDrafted(d) ? `Owner: ${pitcherOwnerMap[d.name].owner}` : "Undrafted";
      return `<strong>${d.name}</strong><br>Strikeouts: ${d.k}<br>${d.team}<br>${owner}`;
    });

    kBars.transition().duration(600).delay((_, i) => i * 25)
      .attr("width", d => x(d.k));

    g.selectAll(".win-label")
      .data(kData)
      .join("text")
      .attr("class", "win-label")
      .attr("y", d => y(d.name) + y.bandwidth() / 2 + 4)
      .attr("x", d => x(d.k) + 6)
      .attr("opacity", 0)
      .text(d => d.k)
      .transition().duration(600).delay((_, i) => i * 25 + 300)
      .attr("opacity", d => isPitcherDrafted(d) ? 1 : 0.5);

    const labels = svg.append("g")
      .selectAll(".pitcher-row")
      .data(kData)
      .join("g")
      .attr("class", "pitcher-row")
      .attr("transform", d =>
        `translate(0, ${margin.top + y(d.name) + y.bandwidth() / 2})`
      )
      .attr("opacity", d => isPitcherDrafted(d) ? 1 : 0.5);

    labels.append("text")
      .attr("class", "team-label")
      .attr("x", isMobile ? 8 : 14).attr("y", 5)
      .attr("font-size", isMobile ? "5px" : "13px")
      .text(d => isMobile ? truncName(d.name, 16) : d.name);
  }

  /* ═══════════════════════════════════════
     ROOKIE WAR CHART
     ═══════════════════════════════════════ */
  document.getElementById("war-loading").remove();

  const rookieOwnerMap = {};
  PLAYERS.forEach(p => { rookieOwnerMap[p.rookie] = { color: p.color, owner: p.name, emoji: p.emoji }; });

  const warData = allWarData.filter(d => d.war !== undefined);

  {
    const isRookieDrafted = d => d.name in rookieOwnerMap;
    const margin = isMobile
      ? { top: 15, right: 40, bottom: 35, left: 120 }
      : { top: 20, right: 60, bottom: 40, left: 200 };
    const rowH = isMobile ? 26 : 32;
    const width  = Math.max(baseWidth, margin.left + margin.right + 100);
    const height = margin.top + margin.bottom + warData.length * rowH;

    const svg = d3.select("#war-container")
      .append("svg")
      .attr("viewBox", `0 0 ${width} ${height}`)
      .attr("preserveAspectRatio", "xMinYMin meet")
      .attr("width", "100%")
      .style("height", "auto");

    const g = svg.append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    const innerW = width - margin.left - margin.right;
    const innerH = height - margin.top - margin.bottom;

    const xMin = d3.min(warData, d => d.war) < 0 ? d3.min(warData, d => d.war) - 0.5 : 0;
    const x = d3.scaleLinear()
      .domain([xMin, d3.max(warData, d => d.war) + 0.5])
      .range([0, innerW]);

    const y = d3.scaleBand()
      .domain(warData.map(d => d.name))
      .range([0, innerH])
      .padding(0.25);

    g.append("g")
      .attr("class", "axis")
      .attr("transform", `translate(0,${innerH})`)
      .call(d3.axisBottom(x).ticks(isMobile ? 4 : 8))
      .selectAll("text").style("fill", "#8b90a0");

    g.append("text")
      .attr("x", innerW / 2).attr("y", innerH + 34)
      .attr("text-anchor", "middle")
      .attr("fill", "#636882").attr("font-size", "12px")
      .text(isMobile ? "WAR" : "WAR (Wins Above Replacement)");

    const zeroX = x(0);

    const warBars = g.selectAll(".bar")
      .data(warData)
      .join("rect")
      .attr("class", "bar")
      .attr("y", d => y(d.name))
      .attr("height", y.bandwidth())
      .attr("x", d => d.war >= 0 ? zeroX : x(d.war))
      .attr("width", 0)
      .attr("rx", 4)
      .attr("fill", d => isRookieDrafted(d) ? rookieOwnerMap[d.name].color : "#555")
      .attr("opacity", d => isRookieDrafted(d) ? 1 : 0.5);

    attachTooltip(warBars, d => {
      const owner = isRookieDrafted(d) ? `Owner: ${rookieOwnerMap[d.name].owner}` : "Undrafted";
      return `<strong>${d.name}</strong><br>WAR: ${d.war}<br>${d.team}<br>${owner}`;
    });

    warBars.transition().duration(600).delay((_, i) => i * 25)
      .attr("width", d => Math.abs(x(d.war) - zeroX));

    g.selectAll(".win-label")
      .data(warData)
      .join("text")
      .attr("class", "win-label")
      .attr("y", d => y(d.name) + y.bandwidth() / 2 + 4)
      .attr("x", d => d.war >= 0 ? x(d.war) + 6 : x(d.war) - 6)
      .attr("text-anchor", d => d.war >= 0 ? "start" : "end")
      .attr("opacity", 0)
      .text(d => d.war)
      .transition().duration(600).delay((_, i) => i * 25 + 300)
      .attr("opacity", d => isRookieDrafted(d) ? 1 : 0.5);

    const labels = svg.append("g")
      .selectAll(".rookie-row")
      .data(warData)
      .join("g")
      .attr("class", "rookie-row")
      .attr("transform", d =>
        `translate(0, ${margin.top + y(d.name) + y.bandwidth() / 2})`
      )
      .attr("opacity", d => isRookieDrafted(d) ? 1 : 0.5);

    labels.append("text")
      .attr("class", "team-label")
      .attr("x", isMobile ? 8 : 14).attr("y", 5)
      .attr("font-size", isMobile ? "5px" : "13px")
      .text(d => isMobile ? truncName(d.name, 16) : d.name);
  }
})();
</script>
</body>
</html>
